<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🤍</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#ffd6eb,#ffeef7);
    font-family:Arial, sans-serif;
    text-align:center;
    overflow:hidden;
}

#balloon{
    width:220px;
    height:270px;
    background:#ff4da6;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    color:white;
    cursor:pointer;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    transition:0.2s;
}

#balloon:active{
    transform:scale(0.9);
}

#message{
    display:none;
    animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div id="balloon">1</div>

<div id="message">
    <h1 style="font-size:40px;">🎉 Happy Birthday, Sayang 🤍</h1>
    <h2 style="font-size:50px;">23rd looks perfect on you.</h2>
</div>

<script>
let current = 1;
let balloon = document.getElementById("balloon");
let message = document.getElementById("message");

balloon.addEventListener("click", function(){

    if(current < 25){
        current++;
        balloon.innerText = current;
    } 
    else {
        balloon.style.display = "none";
        message.style.display = "block";
    }

});
</script>

</body>
</html>
