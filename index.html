<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(to bottom,#ffdde1,#fca1c1,#ff85a1);
    overflow-x:hidden;
}

h1{
    color:white;
    margin-top:40px;
}

#balloon{
    width:120px;
    height:160px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    color:white;
    cursor:pointer;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    margin:50px auto;
    transition:0.2s;
}

#balloon::after{
    content:"";
    position:absolute;
    bottom:-40px;
    left:50%;
    width:2px;
    height:40px;
    background:#555;
    transform:translateX(-50%);
}

.pop{
    animation:popEffect 0.3s forwards;
}

@keyframes popEffect{
    0%{transform:scale(1); opacity:1;}
    100%{transform:scale(1.5); opacity:0;}
}

#nextBtn{
    margin-top:30px;
    font-size:24px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
}

.final-section{
    padding:40px 20px;
    color:white;
}

.photo{
    width:280px;
    border-radius:20px;
    margin:20px auto;
    display:block;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.long-message{
    max-height:400px;
    overflow-y:auto;
    margin:30px auto;
    padding:20px;
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    backdrop-filter: blur(10px);
    text-align:left;
    line-height:1.6;
}
</style>
</head>

<audio id="bgMusic" loop autoplay>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/28/audio_2f5b6b28de.mp3?filename=soft-melody-1100.mp3" type="audio/mpeg">
</audio>

<div id="balloon">1</div>

<script>
let current = 1;
let balloon = document.getElementById("balloon");
let total = 25;

/* suara pop */
let popSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-balloon-pop-2357.mp3");

function randomColor(){
    const colors = ["#ff4d6d","#ff85a1","#f72585","#b5179e","#7209b7","#560bad","#480ca8","#3a0ca3","#4361ee","#4895ef"];
    return colors[Math.floor(Math.random()*colors.length)];
}

balloon.style.background = randomColor();

balloon.addEventListener("click", function(){
    popSound.currentTime = 0;
    popSound.play();
    balloon.classList.add("pop");

    setTimeout(()=>{
        balloon.classList.remove("pop");

        if(current < total){
            current++;
            balloon.innerText = current;
            balloon.style.background = randomColor();
        } else {
            balloon.style.display = "none";
            showMessage();
        }
    },300);
});

function showMessage(){
    document.body.innerHTML = `
    <div class="final-section">
        <h1>23rd looks perfect on you 🤍</h1>
        <button id="nextBtn">Selanjutnya →</button>
    </div>
    `;

}
